name: Production Deployment
run-name: ${{ github.actor }} testing application, building images, and deploying to production server

on:
  # Trigger manually
  workflow_dispatch:

  # or when pushed to main
  push:
    branches:
      - main

jobs:
  tests:
    name: Run Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, sqlite3, pdo_sqlite
          coverage: none

      - name: Validate composer.json and composer.lock
        run: composer validate --no-check-publish

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Run tests (Pest)
        run: |
          vendor/bin/pest --colors=always --ci

  build:
    runs-on: ubuntu-latest
    needs: tests

    steps:
      # Checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Docker buildX
        uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: hub.ar5.in
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # Build Images

      - name: Build App Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/common/php-fpm/Dockerfile
          push: true
          tags: hub.ar5.in/rolify/app:${{ github.sha }}
          target: production

      - name: Build Web Server Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/production/nginx/Dockerfile
          push: true
          tags: hub.ar5.in/rolify/web:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to Production Server using Docker Stack
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}  # e.g., your VPS IP or hostname
          username: ${{ secrets.SERVER_USER }}  # e.g., root or your Debian user
          key: ${{ secrets.SSH_PRIVATE_KEY }}  # SSH private key content
          port: 22
          script: |
            export IMAGE_TAG=${{ github.sha }}
            docker stack deploy -c ${{ secrets.PRODUCTION_PATH }}/docker-stack.yaml --with-registry-auth -d rolify_prod
