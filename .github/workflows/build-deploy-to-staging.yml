name: Build Images and deploy to staging server
run-name: ${{ github.actor }} building images and deploying to staging server

on:
  # Trigger manually
  workflow_dispatch:

  # or when pushed to develop
  push:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Docker buildX
        uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: hub.ar5.in
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # Build Images

      - name: Build App Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/common/php-fpm/Dockerfile
          push: true
          tags: hub.ar5.in/rolify/app:${{ github.sha }}
          target: production

      - name: Build Web Server Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/staging/nginx/Dockerfile
          push: true
          tags: hub.ar5.in/rolify/web:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to Staging Server using Docker Stack
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}  # e.g., your VPS IP or hostname
          username: ${{ secrets.SERVER_USER }}  # e.g., root or your Debian user
          key: ${{ secrets.SSH_PRIVATE_KEY }}  # SSH private key content
          port: 22
          script: |
            export IMAGE_TAG=${{ github.sha }}
            docker stack deploy -c ${{ secrets.STAGING_PATH }}/docker-stack.yaml --with-registry-auth -d rolify_stg
